openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: E-Migration Assist API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Pre-launch immigration assessment leads
  - name: stats
    description: Aggregate stats
  - name: analytics
    description: Funnel analytics events
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /leads:
    post:
      operationId: createLead
      tags: [leads]
      summary: Submit a completed immigration assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadInput"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "200":
          description: Existing lead updated (duplicate email or whatsapp detected)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    get:
      operationId: listLeads
      tags: [leads]
      summary: List recent leads (admin overview) with optional filters
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: priority
          in: query
          required: false
          description: Filter by high | medium | low
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter by new | reviewing | contacted | converted | closed
          schema:
            type: string
        - name: nationality
          in: query
          required: false
          schema:
            type: string
        - name: situation
          in: query
          required: false
          description: Filter by immigrationSituation enum value
          schema:
            type: string
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminLeadListItem"
  /leads/{referenceNumber}:
    get:
      operationId: getLeadByReference
      tags: [leads]
      summary: Look up a lead by reference number
      parameters:
        - name: referenceNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lead found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicLead"
        "404":
          description: Not found
  /leads/by-id/{id}:
    get:
      operationId: getLeadById
      tags: [leads]
      summary: Look up a lead by internal UUID (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lead found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
  # NOTE: PATCH /api/admin/leads/{id} is the canonical admin mutation
  # endpoint.  It is intentionally NOT modelled in this OpenAPI spec because
  # it requires an `x-admin-token` header that the generated React Query
  # mutator does not surface; clients call it directly with `fetch`, mirroring
  # the pattern used by /api/admin/email/update.
  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Aggregate stats (totals, priority breakdown)
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"
  /stats/lead-mix:
    get:
      operationId: getStatsLeadMix
      tags: [stats]
      summary: Lead mix — individuals by inquiry_type, professionals by organization_type
      responses:
        "200":
          description: Lead mix payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsLeadMix"
  /analytics/events:
    post:
      operationId: trackAnalyticsEvent
      tags: [analytics]
      summary: Record a funnel analytics event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyticsEventInput"
      responses:
        "201":
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsEventResponse"
  /public/status/{referenceNumber}:
    get:
      operationId: getPublicStatus
      tags: [public]
      summary: Look up a lead's public status by reference number
      description: |
        Public-safe status lookup for users returning with their reference
        number. Rate limited per IP. Returns the same generic 404 for both
        unknown references and malformed references to prevent enumeration.
        The response body intentionally excludes every internal CRM field.
      parameters:
        - in: path
          name: referenceNumber
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public status payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStatus"
        "404":
          description: Reference not found
        "429":
          description: Too many requests
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List uploaded documents for a lead
      description: |
        Returns the documents previously uploaded for a lead.

        Two related document endpoints are intentionally NOT defined in this
        spec because their request/response shapes (multipart upload, raw
        binary download) cannot be modelled by Orval's React Query codegen:
          - POST /api/documents/upload     (multipart/form-data: file, leadId, documentType)
          - GET  /api/documents/{id}/download  (returns the file bytes)
        Clients call these directly with `fetch` or an anchor href.
      parameters:
        - in: query
          name: leadId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    CreateLeadInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        whatsapp:
          type: string
        nationality:
          type: string
        countryOfResidence:
          type: string
        currentlyInSouthAfrica:
          type: boolean
        passportStatus:
          type: string
          description: 'valid | expired | lost | none'
        visaHistory:
          type: string
        immigrationSituation:
          type: string
          description: 'valid | expired | overstay | undesirable | prohibited | visa_required | unknown'
        visaExpiryDate:
          type: string
          format: date
        exitDate:
          type: string
          format: date
        borderDocumentIssued:
          type: string
        overstayReason:
          type: string
          description: 'medical | accident | family_emergency | admin_delay | other'
        hasSupportingDocuments:
          type: string
          description: 'yes | some | no'
        previousOverstay:
          type: string
        preferredContactMethod:
          type: string
          description: 'email | whatsapp | phone'
        consentAccepted:
          type: boolean
        verifiedOtpId:
          type: string
          format: uuid
          description: >-
            UUID returned by POST /api/otp/verify. Required in production —
            server enforces that the verified channel matches the submitted
            email or canonical whatsapp. Set DISABLE_OTP_VERIFICATION=1
            (non-prod only) to bypass for CLI/automated smoke tests.
      required:
        - fullName
        - email
        - nationality
        - immigrationSituation
        - consentAccepted
    Lead:
      type: object
      properties:
        id:
          type: string
        referenceNumber:
          type: string
        fullName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        whatsapp:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
        countryOfResidence:
          type: string
          nullable: true
        currentlyInSouthAfrica:
          type: boolean
          nullable: true
        passportStatus:
          type: string
          nullable: true
        visaHistory:
          type: string
          nullable: true
        immigrationSituation:
          type: string
          nullable: true
        visaExpiryDate:
          type: string
          nullable: true
        exitDate:
          type: string
          nullable: true
        borderDocumentIssued:
          type: string
          nullable: true
        overstayReason:
          type: string
          nullable: true
        hasSupportingDocuments:
          type: string
          nullable: true
        previousOverstay:
          type: string
          nullable: true
        internalClassification:
          type: string
          nullable: true
        leadScore:
          type: integer
          nullable: true
        leadCategory:
          type: string
          nullable: true
        leadPriority:
          type: string
          nullable: true
          description: 'critical | high | medium | low'
        leadStatus:
          type: string
          description: >-
            new | reviewing | contacted | awaiting_response | engaged |
            qualified | proposal_sent | ready_for_case | converted | closed.
            Forward-only — PATCH /admin/leads/{id} returns 409 on regression.
        leadType:
          type: string
          description: >-
            CRM Phase A discriminator. "individual" for B2C leads from the
            public assessment form; "professional" for B2B leads from CSV/XLSX
            import or future API integrations. Defaults to "individual".
        inquiryType:
          type: string
          nullable: true
          description: >-
            Meaningful only for individual leads.
            visa_inquiry | overstay_appeal | travel_entry_assistance.
        source:
          type: string
          nullable: true
          description: 'web_form | csv_import | manual | api'
        assignedTo:
          type: string
          format: uuid
          nullable: true
          description: admin_users.id of the operator the lead is assigned to.
        lastContactedAt:
          type: string
          nullable: true
        nextFollowUpAt:
          type: string
          nullable: true
        tags:
          type: array
          nullable: true
          items:
            type: string
        organizationName:
          type: string
          nullable: true
        organizationType:
          type: string
          nullable: true
          description: >-
            law_firm | immigration_consultancy | global_mobility |
            independent_practitioner. Null for individual leads.
        representativeName:
          type: string
          nullable: true
        representativeEmail:
          type: string
          nullable: true
        representativePhone:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        firmSize:
          type: string
          nullable: true
        operatingRegions:
          type: array
          nullable: true
          items:
            type: string
        serviceFocus:
          type: string
          nullable: true
        estimatedClientVolume:
          type: integer
          nullable: true
        nextStep:
          type: string
          nullable: true
          description: >-
            Conversion-funnel hint derived from leadStatus. Values:
            "Review lead" (new), "Contact lead" (reviewing),
            "Await response" (contacted), "Prepare case conversion" (qualified),
            "Initiate case handover" (ready_for_case),
            "Move to case system" (converted), null (closed/unknown).
        caseId:
          type: string
          nullable: true
          description: >-
            UUID of the linked lead_cases row.  null until the lead reaches
            `converted` status.  PATCH /admin/leads/{id} populates it as a
            side-effect of the converted-status transition; the GET list
            and detail endpoints surface it via LEFT JOIN.  The admin
            dashboard uses it to deep-link to /admin/case/{caseId}.
        adminNotes:
          type: string
          nullable: true
        hasWhatsapp:
          type: boolean
          description: True if the lead has a stored canonical WhatsApp number.
        preferredContactMethod:
          type: string
          nullable: true
        consentAccepted:
          type: boolean
        consentTimestamp:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - referenceNumber
        - consentAccepted
        - leadStatus
        - leadType
        - createdAt
        - updatedAt
    PublicLead:
      type: object
      description: |
        Public-safe view returned by GET /leads/{referenceNumber} for the
        user-facing reference-lookup page. Strips internal CRM fields
        (leadStatus, leadPriority, internalClassification, leadScore,
        adminNotes) and contact PII (email, whatsapp).
      properties:
        id:
          type: string
        referenceNumber:
          type: string
        fullName:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
        immigrationSituation:
          type: string
          nullable: true
        leadCategory:
          type: string
          nullable: true
        consentAccepted:
          type: boolean
        consentTimestamp:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - referenceNumber
        - consentAccepted
        - createdAt
        - updatedAt
    AdminLeadListItem:
      type: object
      description: |
        Slim row shape returned by GET /api/leads for the admin dashboard.
        Intentionally a strict subset of `Lead` — omits internal "rules
        engine" fields (internalClassification, leadScore, leadCategory,
        adminNotes) and bulky funnel data the dashboard does not need.
      properties:
        id:
          type: string
        referenceNumber:
          type: string
        fullName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        whatsapp:
          type: string
          nullable: true
        immigrationSituation:
          type: string
          nullable: true
        leadStatus:
          type: string
        leadPriority:
          type: string
          nullable: true
        leadType:
          type: string
          description: individual | professional
        inquiryType:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        assignedTo:
          type: string
          nullable: true
          description: admin_users.id of the operator assigned to this lead
        lastContactedAt:
          type: string
          nullable: true
        nextFollowUpAt:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        hasWhatsapp:
          type: boolean
        createdAt:
          type: string
        nextStep:
          type: string
          nullable: true
        caseId:
          type: string
          nullable: true
      required:
        - id
        - referenceNumber
        - leadStatus
        - leadType
        - hasWhatsapp
        - createdAt
    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required: [category, count]
    StatsSummary:
      type: object
      properties:
        totalAssessments:
          type: integer
        last24Hours:
          type: integer
        avgScore:
          type: number
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        byPriority:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
      required: [totalAssessments, last24Hours, avgScore, byCategory, byPriority, byStatus]
    LeadMixBucket:
      type: object
      properties:
        bucket:
          type: string
          description: >-
            For individuals: inquiry_type (visa_inquiry | overstay_appeal |
            travel_entry_assistance | unspecified). For professionals:
            organization_type (law_firm | immigration_consultancy |
            global_mobility | independent_practitioner | unspecified).
        count:
          type: integer
      required: [bucket, count]
    StatsLeadMix:
      type: object
      properties:
        individuals:
          type: object
          properties:
            total:
              type: integer
            buckets:
              type: array
              items:
                $ref: "#/components/schemas/LeadMixBucket"
          required: [total, buckets]
        professionals:
          type: object
          properties:
            total:
              type: integer
            buckets:
              type: array
              items:
                $ref: "#/components/schemas/LeadMixBucket"
          required: [total, buckets]
      required: [individuals, professionals]
    AnalyticsEventInput:
      type: object
      properties:
        eventName:
          type: string
          description: >-
            assessment_started | assessment_completed |
            classification_result | document_upload | lead_contact_clicked
        referenceNumber:
          type: string
          nullable: true
        payload:
          type: object
          nullable: true
          additionalProperties: true
      required: [eventName]
    AnalyticsEventResponse:
      type: object
      properties:
        id:
          type: string
        eventName:
          type: string
        createdAt:
          type: string
      required: [id, eventName, createdAt]
    Document:
      type: object
      properties:
        id:
          type: string
        leadId:
          type: string
        documentType:
          type: string
          description: 'passport | visa_permit | entry_stamp | exit_stamp | undesirable_declaration | medical_evidence | travel_evidence | written_explanation | id_document | proof_of_address | employment_letter | financial_statement | marriage_certificate | birth_certificate | other'
        fileUrl:
          type: string
          description: 'Internal object storage path. Use /api/documents/{id}/download to fetch the bytes.'
        fileName:
          type: string
          nullable: true
        mimeType:
          type: string
          nullable: true
        fileSize:
          type: integer
          nullable: true
        uploadStatus:
          type: string
        createdAt:
          type: string
      required: [id, leadId, documentType, fileUrl, uploadStatus, createdAt]
    PublicStatus:
      type: object
      description: |
        Public-safe status payload returned by GET /api/public/status/:ref.
        Intentionally excludes contact PII and every internal CRM field
        (score, priority, internalClassification, leadStatus, adminNotes).
      properties:
        referenceNumber:
          type: string
        publicLabel:
          type: string
          enum:
            - Assessment Received
            - Supporting Circumstances Present
            - Requires Further Review
            - High Complexity Case
        createdAt:
          type: string
        documentsUploaded:
          type: boolean
      required: [referenceNumber, publicLabel, createdAt, documentsUploaded]
